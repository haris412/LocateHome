<div class="listings-results-header">
  <h2 class="listings-results-header__title">
    Showing {{ resultsCount() }} properties in Ontario
  </h2>

  <div class="listings-results-header__controls">
    <div class="listings-results-header__sort-group">
      <span class="listings-results-header__sort-label">Sort by:</span>

      <app-sort-dropdown
        [value]="selectedSort()"
        [options]="sortOptions()"
        (valueChanged)="sortChanged.emit($event)"
      />
    </div>
