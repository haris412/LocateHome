<section class="listings-page container">
  <div class="listings-page__hero">
    <h1 class="listings-page__title">Find your next property</h1>

    <p class="listings-page__subtitle">
      Browse premium homes for sale and rent with modern filters,
      verified listings and a clean search experience.
    </p>
  </div>

  <app-listings-toolbar />

  <app-listings-results-header
    [resultsCount]="listings().length"
    [selectedSort]="selectedSort()"
    [sortOptions]="sortOptions()"
    [selectedView]="selectedView()"
    (sortChanged)="updateSort($event)"
    (viewChanged)="selectedView.set($event)"
  />

  <app-listings-grid
    [items]="listings()"
    [viewMode]="selectedView()"
    (cardClicked)="openListingDetail($event)"
    (favoriteToggled)="onFavoriteToggled($event)"
  />
</section>
