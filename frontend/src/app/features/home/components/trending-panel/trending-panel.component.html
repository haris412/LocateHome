<div class="trending-panel section-card">
  <div class="trending-panel__top">
    <span class="trending-panel__label">Trending cities</span>

    <div class="trending-panel__controls">
      <button type="button"
              class="trending-panel__arrow"
              aria-label="Previous">
        <mat-icon fontSet="material-symbols-outlined"
                  inline>
          chevron_left
        </mat-icon>
      </button>

      <button type="button"
              class="trending-panel__arrow"
              aria-label="Next">
        <mat-icon fontSet="material-symbols-outlined"
                  inline>
          chevron_right
        </mat-icon>
      </button>
    </div>
  </div>

  <h3 class="trending-panel__title">Where demand is surging</h3>

  <div class="trending-panel__grid">
    @for (item of items(); track item.id) {
    <article class="trending-panel__item">
      <div class="trending-panel__item-top">
        <strong>{{ item.city }}</strong>
        <span class="trending-panel__growth">{{ item.growth }}</span>
      </div>

      <p>{{ item.summary }}</p>
    </article>
    }
  </div>

  <div class="trending-panel__progress">
    <span class="trending-panel__progress-fill"></span>
  </div>
</div>
