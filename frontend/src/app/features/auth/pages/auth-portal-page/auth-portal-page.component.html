<div class="app-shell-bg">
  <div class="container">
    <div class="auth-shell">
      <div class="row g-4 align-items-stretch auth-layout-row">
        <div class="d-none d-lg-block col-lg-6 hero-column">
          <app-auth-hero-panel />
        </div>

        <div class="col-12 col-lg-6">
          <section class="right-column">
            <app-segmented-tabs
              [active]="activeSegment()"
              (changed)="activeSegment.set($event)"
            />

            <div class="auth-form-area mt-3">
              @if (activeSegment() === 'signup') {
                <app-signup-card />
              } @else {
                <app-login-card />
              }
            </div>
          </section>
        </div>
      </div>
    </div>
  </div>
</div>
