<div class="segmented-tabs" role="tablist" aria-label="Authentication tabs">
  <div
    class="segmented-tabs__pill"
    [class.segmented-tabs__pill--login]="visualActive() === 'login'"
    aria-hidden="true"
  ></div>

  <button
    type="button"
    role="tab"
    class="segmented-tabs__button"
    [class.segmented-tabs__button--active]="visualActive() === 'signup'"
    [attr.aria-selected]="active() === 'signup'"
    [attr.tabindex]="active() === 'signup' ? 0 : -1"
    (click)="selectTab('signup')"
  >
    Sign up
  </button>

  <button
    type="button"
    role="tab"
    class="segmented-tabs__button"
    [class.segmented-tabs__button--active]="visualActive() === 'login'"
    [attr.aria-selected]="active() === 'login'"
    [attr.tabindex]="active() === 'login' ? 0 : -1"
    (click)="selectTab('login')"
  >
    Log in
  </button>
</div>
