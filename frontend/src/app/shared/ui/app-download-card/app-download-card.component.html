<section class="app-download-card">
  <div class="row align-items-center g-4 g-xl-5">
    <div class="col-12 col-lg-7">
      <div class="app-download-card__content">
        <div class="app-download-card__pills">
          <span class="app-download-card__pill">
            <mat-icon fontSet="material-symbols-outlined" inline>
              smartphone
            </mat-icon>
            <span>Property app</span>
          </span>
        </div>

        <h2 class="app-download-card__title">{{ title() }}</h2>

        <p class="app-download-card__description">
          {{ description() }}
        </p>

        <ul class="app-download-card__bullets">
          @for (bullet of bullets(); track bullet) {
            <li class="app-download-card__bullet">
              <span class="app-download-card__bullet-icon">
                <mat-icon fontSet="material-symbols-outlined" inline>
                  radio_button_checked
                </mat-icon>
              </span>
              <span>{{ bullet }}</span>
            </li>
          }
        </ul>

        <div class="app-download-card__actions">
          <a
            href="https://apps.apple.com"
            target="_blank"
            rel="noopener noreferrer"
            class="app-download-card__btn app-download-card__btn--primary"
          >
            <mat-icon fontSet="material-symbols-outlined" inline>
              download
            </mat-icon>
            <span>Download on the App Store</span>
          </a>

          <a
            href="https://play.google.com"
            target="_blank"
            rel="noopener noreferrer"
            class="app-download-card__btn app-download-card__btn--secondary"
          >
            <mat-icon fontSet="material-symbols-outlined" inline>
              play_arrow
            </mat-icon>
            <span>Get it on Google Play</span>
          </a>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-5">
      <div class="app-download-card__phone-wrap">
        <img
          class="app-download-card__phone"
          [src]="phoneImageUrl()"
          [alt]="title()"
        />

        <div class="app-download-card__phone-note">
          <small>Valuation update</small>
          <strong>New estimate ready</strong>
        </div>
      </div>
    </div>
  </div>
</section>
