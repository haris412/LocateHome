<div class="feature-card soft-card">
  <span class="auth-icon-box"
        aria-hidden="true">
    <mat-icon fontSet="material-symbols-outlined"
              inline>
      {{ icon() }}
    </mat-icon>
  </span>

  <div class="feature-copy">
    <h3 class="feature-title">{{ title() }}</h3>
    <p class="feature-description">{{ description() }}</p>
  </div>
</div>
