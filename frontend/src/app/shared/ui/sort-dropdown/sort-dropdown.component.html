<div class="sort-select">
  <mat-form-field appearance="outline" class="sort-select__field">
    <mat-select
      [value]="value()"
      (valueChange)="valueChanged.emit($event)"
    >
      @for (option of options(); track option.id) {
        <mat-option [value]="option.id">
          {{ option.label }}
        </mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>
