<app-section-heading
  [title]="title()"
  [subtitle]="subtitle()"
  [actionLabel]="actionLabel()"
  icon="video_camera_back"
  (actionClick)="openAll()"
  [isBorderless]="true"
/>

<div class="video-strip">
  @for (video of videos(); track video.id; let i = $index) {
    <button
      type="button"
      class="video-card"
      (click)="openVideo(i)"
    >
      <img class="video-card__image" [src]="video.imageUrl" [alt]="video.title" />

      <span class="video-card__overlay"></span>

      <span class="video-card__play">
        <mat-icon fontSet="material-symbols-outlined" inline>play_arrow</mat-icon>
      </span>

      <div class="video-card__content">
        <h3 class="video-card__title">{{ video.title }}</h3>
      </div>
    </button>
  }
</div>

@if (isOverlayOpen()) {
  <app-video-gallery-overlay
    [videos]="videos()"
    [startIndex]="selectedIndex()"
    (close)="closeOverlay()"
  />
}
