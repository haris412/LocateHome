<app-filter-shell>
  <section
    class="property-filters"
    [class.property-filters--hero]="variant() === 'hero'"
    [class.property-filters--toolbar]="variant() === 'toolbar'"
  >
    <div class="property-filters__top">
      <app-filter-segment-tabs
        [items]="tabs"
        [active]="mode()"
        (changed)="setMode($event)"
      />

      <div class="property-filters__actions">
        @if (showMoreFiltersToggle()) {
          <button
            type="button"
            class="property-filters__action-btn"
            [class.property-filters__action-btn--active]="showMoreFilters()"
            (click)="toggleMoreFilters()"
            [attr.aria-expanded]="showMoreFilters()"
            aria-controls="property-filters-more"
          >
            <mat-icon
              fontSet="material-symbols-outlined"
              inline
              class="property-filters__action-icon"
            >
              tune
            </mat-icon>
            <span>More filters</span>
          </button>
        }
      </div>
    </div>

    <div class="property-filters__grid">
      @for (field of activeFields(); track field.id) {
        <div
          class="property-filters__grid-item"
          [class.property-filters__grid-item--wide]="
            field.id === 'city' ||
            field.id === 'location' ||
            field.id === 'keyword' ||
            field.id === 'area'
          "
          [class.property-filters__grid-item--medium]="
            field.id === 'primaryType' ||
            field.id === 'purpose' ||
            field.id === 'price' ||
            field.id === 'size'
          "
          [class.property-filters__grid-item--narrow]="
            field.id === 'beds' ||
            field.id === 'baths' ||
            field.id === 'subtype'
          "
        >
          <app-filter-select
            [config]="field"
            (valueChanged)="updateField($event)"
          />
        </div>
      }
    </div>

    <div
      id="property-filters-more"
      class="property-filters__more-panel"
      [class.property-filters__more-panel--open]="showMoreFilters()"
    >
      <div class="property-filters__more-panel-inner">
        <app-filter-chip-group
          [items]="activeChips()"
          (toggled)="toggleChip($event)"
        />
      </div>
    </div>
  </section>
</app-filter-shell>
